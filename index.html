<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮🎭 Emoji Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* Fond bleu très clair */
      background: #e0f7ff; 
      text-align: center;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      background: white;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }

    .logo { height: 50px; }
    .title { font-size: 1.5rem; font-weight: bold; color: #333; }

    .youtube-button {
      background-color: #FF0000;
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .youtube-button:hover { background-color: #CC0000; }

    /* Texte de mise à jour */
    .update-banner {
      background: #ff4757;
      color: white;
      padding: 10px;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 1px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .game-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .game-card {
      position: relative;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      height: 140px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }

    /* Style pour la carte GÉANTE */
    .game-card.featured {
      grid-column: 1 / -1; /* Prend toute la largeur */
      height: 350px; /* Très grande */
      border: 5px solid #ff4757;
    }

    .game-card:hover {
      transform: scale(1.05);
      box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.3);
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s;
    }

    .game-card:hover img { opacity: 0.2; }

    .game-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      color: #333;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .featured .game-title {
        font-size: 2.5rem; /* Texte plus gros pour la grande carte */
    }

    .game-card:hover .game-title { opacity: 1; }

    /* Emojis qui tombent */
    .emoji-fall {
      position: fixed;
      top: -2em;
      font-size: 2rem;
      pointer-events: none;
      z-index: 1;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo emoji games.webp" alt="Emoji Games" class="logo">
    <div class="title">🎮🎭 Emoji Games</div>
    <a href="https://youtube.com/@emoji_games_yt" target="_blank" class="youtube-button">
      📺 YouTube
    </a>
  </div>

  <div class="update-banner">
    NEW UPDATE : ADDED ADMIN ABUSE
  </div>

  <div class="game-container">
    <div class="game-card featured" onclick="startGame('Fast Collect Challenge.html')">
      <img src="fast collect challeng.png" alt="Fast Collect Challenge">
      <div class="game-title">Fast Collect Challenge</div>
    </div>

    <div class="game-card" onclick="startGame('Echapper les couteaux.html')">
      <img src="echapper les cpouteaux.png" alt="Échapper les Couteaux">
      <div class="game-title">Échapper les Couteaux</div>
    </div>

    <div class="game-card" onclick="startGame('SURIMI SABRE.html')">
      <img src="surimi sabre.png" alt="Surimi Sabre">
      <div class="game-title">Surimi Sabre</div>
    </div>

    <div class="game-card" onclick="startGame('The Mafia Kills.html')">
      <img src="Mafia Kills.png" alt="Mafia Kills">
      <div class="game-title">Mafia Kills</div>
    </div>

    <div class="game-card" onclick="startGame('The Fruits Memories.html')">
      <img src="fruits-bons-pour-la-sante-.png" alt="The Fruits Memories">
      <div class="game-title">The Fruits Memories</div>
    </div>

    <div class="game-card" onclick="startGame('Tic Tac Toe.html')">
      <img src="https://static.vecteezy.com/system/resources/thumbnails/002/423/122/small/tic-tac-toe-icon-illustration-free-vector.jpg" alt="Tic Tac Toe">
      <div class="game-title">Tic Tac Toe</div>
    </div>

    <div class="game-card" onclick="startGame('Jeu de... de fruit!.html')">
      <img src="https://contents.mediadecathlon.com/s1057542/k$f8f7d14e0cf9acef164e5b965b6cf197/1800x0/1871pt1943/3732xcr3886/default.jpeg?format=auto" alt="Easter Egg BAAHAAAAHAA">
      <div class="game-title">Emoji Ninja</div>
    </div>
  </div>

  <script>
    function startGame(gameUrl) {
      window.location.href = gameUrl;
    }

    // Emojis aléatoires qui tombent
    const emojis = ['🎮','🎭','🔥','⭐','🍀','🍎','🚀','💎','👻','👾','🍕','😎','💥','✨'];
    
    function createEmoji() {
      const emoji = document.createElement('div');
      emoji.className = 'emoji-fall';
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.left = Math.random() * 98 + 'vw';
      emoji.style.animationDuration = (Math.random() * 2 + 3) + 's';
      emoji.style.opacity = Math.random() * 0.5 + 0.3;
      document.body.appendChild(emoji);
      setTimeout(() => emoji.remove(), 5000);
    }
    
    setInterval(createEmoji, 250); // Un peu plus rapide pour plus d'ambiance
  </script>
</body>
</html>
