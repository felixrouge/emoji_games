<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fast Collect Challenge</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Nunito', sans-serif; }
        canvas { display: block; }
        #score, #timer-display { position: absolute; color: white; font-size: 28px; font-weight: 900; z-index: 10; text-shadow: 2px 2px 4px black; top: 20px; }
        #score { left: 20px; } #timer-display { right: 20px; }
        
        /* SONDAGE AU MILIEU */
        #poll-box { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 25px; border-radius: 20px; 
            border: 3px solid #5865F2; color: white; display: none; z-index: 5000; 
            min-width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .poll-btn { background: #333; color: white; border: 2px solid #555; padding: 12px; cursor: pointer; border-radius: 10px; margin: 10px 0; width: 100%; font-family: 'Nunito'; font-weight: 900; transition: 0.2s; }
        .poll-btn:hover { background: #5865F2; border-color: white; }
        
        /* BARRES DE PROGRESSION */
        .progress-container { background: #444; border-radius: 10px; height: 20px; width: 100%; margin-top: 5px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: #32CD32; transition: width 0.3s; }

        /* HUD EN BAS À DROITE (REMIS) */
        #hud-events { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: row-reverse; gap: 15px; z-index: 1000; }
        .event-card { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; border: 2px solid #555; min-width: 80px; }
        .img-container { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 40px; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 2; }
        .event-timer { color: white; font-weight: 900; font-size: 18px; margin-top: 5px; }

        /* MESSAGES ADMIN */
        #msg-container-bottom { position: fixed; bottom: 150px; left: 0; width: 100%; display: flex; flex-direction: column-reverse; align-items: center; z-index: 10000; pointer-events: none; }
        .admin-msg { font-size: 48px; font-weight: 900; text-align: center; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); margin: 5px; width: 100%; }
        .txt-violet { color: #A020F0; }
        .rainbow-text { background: linear-gradient(to right, #ff9999, #ffcc99, #ffff99, #99ff99, #99ccff, #cc99ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="timer-display">Timer: 60</div>
    
    <div id="poll-box">
        <h2 id="poll-q" style="margin-top:0">Question ?</h2>
        <div id="poll-options">
            <button class="poll-btn" onclick="vote(1)" id="poll-o1">Option A</button>
            <div class="progress-container" id="cont-1"><div class="progress-bar" id="bar-1"></div></div>
            
            <button class="poll-btn" onclick="vote(2)" id="poll-o2">Option B</button>
            <div class="progress-container" id="cont-2"><div class="progress-bar" id="bar-2"></div></div>
        </div>
        <p id="poll-total" style="font-size: 12px; color: #aaa; margin-top: 15px;"></p>
    </div>

    <div id="msg-container-bottom"></div>
    <div id="hud-events"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const ably = new Ably.Realtime('bZFMkw.u1oLTg:xhXyW5SeGGYAmDyoGjYDfkbodtDNkZcEMXw11__DDxM');
        const channel = ably.channels.get('admin-commands');
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let timeLeft = 60, score = 0, gameActive = true, currentLuck = 0.05;
        let player = { x: 0, y: 0 }, ball = { x: 100, y: 100, speed: 4, baseSpeed: 4, emoji: "🏐" };
        let greenAppleBoost = 3, apples = [], activeTimers = {};
        
        // Stats Sondage
        let votes = { 1: 0, 2: 0, total: 0 };

        channel.subscribe((msg) => {
            const d = msg.data;

            if (msg.name === 'poll') {
                votes = { 1: 0, 2: 0, total: 0 };
                document.getElementById('poll-box').style.display = 'block';
                document.getElementById('poll-q').innerText = d.q;
                document.getElementById('poll-o1').innerText = d.o1;
                document.getElementById('poll-o2').innerText = d.o2;
                document.getElementById('poll-o1').style.display = 'block';
                document.getElementById('poll-o2').style.display = 'block';
                document.getElementById('cont-1').style.display = 'none';
                document.getElementById('cont-2').style.display = 'none';
                document.getElementById('poll-total').innerText = "En attente des votes...";
                setTimeout(() => { document.getElementById('poll-box').style.display = 'none'; }, 15000);
            }

            // Sync des votes entre joueurs
            if (msg.name === 'vote_sync') {
                votes[d.opt]++; votes.total++;
                updateBars();
            }

            if (msg.name === 'ballSpeed') {
                ball.baseSpeed = 4 * d.mult; ball.speed = ball.baseSpeed;
                showAdvancedMsg(`FelixRouge set ball speed to x${d.mult}`, 'bottom', {color: d.mult>=2?'black':'white'});
            }

            if (msg.name === 'appleSpeed') {
                greenAppleBoost = d.mult;
                let style = d.mult == 3 ? {color:'#32CD32'} : (d.mult == 5 ? {color:'#DA70D6'} : {isRainbow: true});
                showAdvancedMsg(`FelixRouge set apple boost to x${d.mult}`, 'bottom', style);
            }

            if (msg.name === 'luck') {
                currentLuck = d.val;
                showAdvancedMsg(`FelixRouge activated ${d.mult}x luck!`, 'bottom', getLuckStyle(d.mult));
                startHudTimer('luck', getLuckImg(d.mult), d.time, false, () => currentLuck = 0.05);
            }

            if (msg.name === 'greentime') {
                let oldL = currentLuck; currentLuck = 1.0;
                showAdvancedMsg(`FelixRouge activated <span class="txt-violet">Green time</span>!`, 'bottom', getGTStyle(d.time));
                startHudTimer('gt', "https://static.vecteezy.com/system/resources/previews/016/733/263/non_2x/cute-illustration-of-a-green-apple-in-cartoon-style-on-isolated-background-vector.jpg", d.time, true, () => currentLuck = oldL);
            }

            if (msg.name === 'addtime') {
                timeLeft += d.seconds;
                showAdvancedMsg(`FelixRouge added ${d.seconds}s to your <span class="txt-violet">timer</span>!`, 'bottom', getTStyle(d.seconds));
            }

            if (msg.name === 'spawn') {
                spawnApple(true, d.count);
                showAdvancedMsg(`FelixRouge spawned ${d.count} Green Apples!`, 'bottom', getSStyle(d.count));
            }

            if (msg.name === 'reset') location.reload();
        });

        function vote(opt) {
            channel.publish('vote_sync', {opt: opt});
            document.getElementById('poll-o1').style.display = 'none';
            document.getElementById('poll-o2').style.display = 'none';
            document.getElementById('cont-1').style.display = 'block';
            document.getElementById('cont-2').style.display = 'block';
        }

        function updateBars() {
            let p1 = (votes[1] / votes.total) * 100;
            let p2 = (votes[2] / votes.total) * 100;
            document.getElementById('bar-1').style.width = p1 + "%";
            document.getElementById('bar-2').style.width = p2 + "%";
            document.getElementById('poll-total').innerText = `${votes.total} votes au total`;
        }

        function startHudTimer(id, url, dur, isA, onE) {
            let container = document.getElementById('hud-events');
            if (activeTimers[id]) { activeTimers[id].remaining += dur; return; }
            let card = document.createElement('div');
            card.className = 'event-card'; card.id = 'event-' + id;
            card.innerHTML = `<div class="img-container"><span>${isA?'🍏':'🍀'}</span><img src="${url}" onerror="this.style.display='none'"></div><div class="event-timer" id="timer-${id}">${dur}s</div>`;
            container.appendChild(card);
            activeTimers[id] = { remaining: dur, interval: setInterval(() => {
                activeTimers[id].remaining--;
                if (activeTimers[id].remaining <= 0 || !gameActive) { clearInterval(activeTimers[id].interval); card.remove(); delete activeTimers[id]; if(onE) onE(); }
                else { let t = document.getElementById('timer-' + id); if(t) t.innerText = activeTimers[id].remaining + "s"; }
            }, 1000)};
        }

        function getLuckImg(m) {
            const imgs = { 2: "https://static.wikia.nocookie.net/stealabr/images/e/ea/2xLuck.webp", 4: "https://static.wikia.nocookie.net/stealabr/images/f/f1/4xLuck.webp", 6: "https://static.wikia.nocookie.net/stealabr/images/9/9e/Clover5.webp", 8: "https://static.wikia.nocookie.net/stealabr/images/7/76/CloverStack.png", 10: "https://static.wikia.nocookie.net/stealabr/images/f/fe/10x.png" };
            return imgs[m] || "";
        }

        function getLuckStyle(m) { if(m==2) return {color:'#32CD32'}; if(m==4) return {color:'#DAA520'}; if(m==6) return {color:'#DA70D6'}; if(m==8) return {isRainbow:true}; if(m==10) return {color:'black'}; return {color:'white'}; }
        function getGTStyle(s) { if(s==5) return {color:'#32CD32'}; if(s==10) return {color:'#DAA520'}; if(s==15) return {color:'#DA70D6'}; if(s==20) return {isRainbow:true}; if(s==30) return {color:'black'}; return {color:'white'}; }
        function getTStyle(s) { if(s==10) return {color:'#32CD32'}; if(s==15) return {color:'#DAA520'}; if(s==20) return {color:'#DA70D6'}; if(s>=30) return {isRainbow:true}; return {color:'white'}; }
        function getSStyle(c) { if(c==3) return {color:'#DAA520'}; if(c==5) return {color:'#DA70D6'}; if(c==7) return {isRainbow:true}; if(c>=10) return {color:'black'}; return {color:'white'}; }

        function showAdvancedMsg(html, pos, style) {
            const container = document.getElementById('msg-container-bottom');
            const div = document.createElement('div');
            div.className = 'admin-msg';
            if(style.isRainbow) div.innerHTML = `<span class="rainbow-text">${html}</span>`;
            else { div.style.color = style.color; div.innerHTML = html; if(style.color === 'black') div.style.textShadow = "0px 0px 8px white"; }
            container.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function spawnApple(fG, c) {
            for(let i=0; i<c; i++) {
                let isOp = fG || Math.random() < currentLuck;
                apples.push({ x: Math.random()*(canvas.width-40)+20, y: Math.random()*(canvas.height-40)+20, size: isOp?22:36, emoji: isOp?"🍏":"🍎", isOp:isOp });
            }
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let dx = player.x - ball.x, dy = player.y - ball.y, dist = Math.sqrt(dx*dx+dy*dy);
            if(dist > 35) { ball.x += (dx/dist)*ball.speed; ball.y += (dy/dist)*ball.speed; }
            ctx.font = "40px Nunito"; ctx.textAlign = "center";
            ctx.fillText("🕹", player.x, player.y); ctx.fillText(ball.emoji, ball.x, ball.y);
            apples = apples.filter(a => {
                let adx = ball.x - a.x, ady = ball.y - a.y;
                if(Math.sqrt(adx*adx+ady*ady) < a.size) {
                    score += a.isOp?3:1; document.getElementById("score").innerText = "Score: " + score;
                    if(a.isOp) { ball.speed = ball.baseSpeed * greenAppleBoost; setTimeout(() => ball.speed = ball.baseSpeed, 3000); }
                    return false;
                }
                ctx.fillText(a.emoji, a.x, a.y); return true;
            });
            requestAnimationFrame(update);
        }

        function countdown() {
            if (timeLeft > 0) { timeLeft--; document.getElementById("timer-display").innerText = "Timer: " + timeLeft; setTimeout(countdown, 1000); }
            else { gameActive = false; setTimeout(() => { if(confirm("Game Over! Restart?")) location.reload(); }, 100); }
        }

        window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
        setInterval(() => { if(gameActive) spawnApple(false, 1); }, 1000);
        update(); countdown();
    </script>
</body>
</html>
