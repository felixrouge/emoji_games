<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fast Collect Challenge</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Nunito', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #score, #timer-display { position: absolute; color: white; font-size: 28px; font-weight: 900; z-index: 10; text-shadow: 2px 2px 4px black; top: 20px; }
        #score { left: 20px; } #timer-display { right: 20px; }

        /* --- HAUT : SONDAGE ET ANNONCES --- */
        #top-ui-wrapper {
            position: fixed; top: 20px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10000; pointer-events: none;
        }
        #poll-box { 
            background: #ADD8E6; padding: 20px; border-radius: 10px; border: 4px solid white; 
            color: black; display: none; width: 550px; text-align: center; pointer-events: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px;
        }
        #poll-q { font-size: 28px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        .poll-ui-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .vote-count { font-size: 30px; font-weight: 900; min-width: 50px; }
        .dual-bar { display: flex; width: 400px; height: 35px; border: 4px solid black; overflow: hidden; border-radius: 8px; background: #555; }
        #bar-1 { width: 50%; background: #FF4444; border-right: 2px solid black; transition: width 0.3s; }
        #bar-2 { width: 50%; background: #4444FF; transition: width 0.3s; }
        .poll-buttons { display: flex; justify-content: center; gap: 30px; }
        .poll-btn { padding: 10px 30px; border-radius: 8px; border: 4px solid black; font-weight: 900; cursor: pointer; color: white; font-size: 18px; }
        #poll-o1 { background: #FF4444; } #poll-o2 { background: #4444FF; }

        /* ANNONCES (SOUS LE SONDAGE) */
        #msg-announce { font-size: 50px; font-weight: 900; color: white; text-shadow: 3px 3px 10px black; }

        /* --- BAS : MESSAGES FelixRouge --- */
        #msg-container-bottom { position: fixed; bottom: 150px; left: 0; width: 100%; display: flex; flex-direction: column-reverse; align-items: center; z-index: 10000; pointer-events: none; }
        .admin-msg { font-size: 45px; font-weight: 900; text-align: center; text-shadow: 2px 2px 8px black; margin: 5px; }

        /* HUD ET DISCORD */
        #hud-events { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: row-reverse; gap: 15px; z-index: 1000; }
        .event-card { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 12px; border: 2px solid #555; min-width: 85px; }
        .img-container { width: 60px; height: 60px; position: relative; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; position: absolute; }
        .event-timer { color: white; font-weight: 900; font-size: 20px; margin-top: 5px; }
        #discord-btn { position: fixed; bottom: 20px; left: 20px; background: #5865F2; color: white; padding: 12px 20px; border-radius: 10px; text-decoration: none; font-weight: 900; z-index: 100; border: 2px solid white; }

        .rainbow-text { background: linear-gradient(to right, #ff9999, #ffff99, #99ff99, #99ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="timer-display">Timer: 60</div>
    
    <div id="top-ui-wrapper">
        <div id="poll-box">
            <div id="poll-q">Caylus or Sammy</div>
            <div class="poll-ui-row">
                <span class="vote-count" id="count-1">0</span>
                <div class="dual-bar"><div id="bar-1"></div><div id="bar-2"></div></div>
                <span class="vote-count" id="count-2">0</span>
            </div>
            <div class="poll-buttons">
                <button class="poll-btn" id="poll-o1" onclick="vote(1)">Option A</button>
                <button class="poll-btn" id="poll-o2" onclick="vote(2)">Option B</button>
            </div>
        </div>
        <div id="msg-announce"></div>
    </div>

    <div id="msg-container-bottom"></div>
    <div id="hud-events"></div>
    <a href="https://discord.gg/CP9hFvjDDC" target="_blank" id="discord-btn">Discord</a>

    <canvas id="gameCanvas"></canvas>

    <script>
        const ably = new Ably.Realtime('bZFMkw.u1oLTg:xhXyW5SeGGYAmDyoGjYDfkbodtDNkZcEMXw11__DDxM');
        const channel = ably.channels.get('admin-commands');
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let timeLeft = 60, score = 0, gameActive = true, currentLuck = 0.05;
        let player = { x: 0, y: 0 }, ball = { x: 100, y: 100, speed: 4, baseSpeed: 4 };
        let greenAppleBoost = 3, apples = [], activeTimers = {};
        let votes = { 1: 0, 2: 0, total: 0 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        channel.subscribe((msg) => {
            const d = msg.data;

            // 1. Annonce Globale (Haut)
            if (msg.name === 'announce') {
                const el = document.getElementById('msg-announce');
                el.innerText = d.text;
                setTimeout(() => el.innerText = "", 5000);
            }

            // 2. Sondage (Haut)
            if (msg.name === 'poll') {
                votes = { 1: 0, 2: 0, total: 0 };
                document.getElementById('poll-box').style.display = 'block';
                document.getElementById('poll-q').innerText = d.q;
                document.getElementById('poll-o1').innerText = d.o1;
                document.getElementById('poll-o2').innerText = d.o2;
                document.getElementById('poll-o1').style.visibility = 'visible';
                document.getElementById('poll-o2').style.visibility = 'visible';
                updateBars();
                setTimeout(() => document.getElementById('poll-box').style.display = 'none', 20000);
            }
            if (msg.name === 'vote_sync') { votes[d.opt]++; votes.total++; updateBars(); }

            // 3. FelixRouge Messages (Bas)
            if (msg.name === 'luck') {
                currentLuck = d.val;
                showBottomMsg(`FelixRouge activated ${d.mult}x luck!`, getLuckStyle(d.mult));
                startHudTimer('luck', getLuckImg(d.mult), d.time, () => currentLuck = 0.05);
            }
            if (msg.name === 'greentime') {
                let old = currentLuck; currentLuck = 1.0;
                showBottomMsg(`FelixRouge activated <span style="color:#A020F0">Green time</span>!`, {isRainbow:true});
                startHudTimer('gt', "https://static.vecteezy.com/system/resources/previews/016/733/263/non_2x/cute-illustration-of-a-green-apple-in-cartoon-style-on-isolated-background-vector.jpg", d.time, () => currentLuck = old);
            }
            if (msg.name === 'ballSpeed') {
                ball.baseSpeed = 4 * d.mult; ball.speed = ball.baseSpeed;
                showBottomMsg(`FelixRouge set ball speed to x${d.mult}`, {color: d.mult>=2?'black':'white'});
            }
            if (msg.name === 'appleSpeed') {
                greenAppleBoost = d.mult;
                showBottomMsg(`FelixRouge set apple boost to x${d.mult}`, {color: '#32CD32'});
            }
            if (msg.name === 'addtime') { timeLeft += d.seconds; showBottomMsg(`FelixRouge added ${d.seconds}s to your timer!`, {color: 'white'}); }
            if (msg.name === 'spawn') spawnApple(true, d.count);
            if (msg.name === 'reset') location.reload();
        });

        function vote(opt) {
            channel.publish('vote_sync', {opt: opt});
            document.getElementById('poll-o1').style.visibility = 'hidden';
            document.getElementById('poll-o2').style.visibility = 'hidden';
        }

        function updateBars() {
            let p1, p2;
            if (votes.total === 0) { p1 = 50; p2 = 50; } 
            else { p1 = (votes[1] / votes.total) * 100; p2 = (votes[2] / votes.total) * 100; }
            document.getElementById('bar-1').style.width = p1 + "%";
            document.getElementById('bar-2').style.width = p2 + "%";
            document.getElementById('count-1').innerText = votes[1];
            document.getElementById('count-2').innerText = votes[2];
        }

        function showBottomMsg(html, style) {
            const div = document.createElement('div');
            div.className = 'admin-msg';
            if(style.isRainbow) div.innerHTML = `<span class="rainbow-text">${html}</span>`;
            else { div.innerHTML = html; div.style.color = style.color; if(style.color==='black') div.style.textShadow="0 0 10px white"; }
            document.getElementById('msg-container-bottom').appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function startHudTimer(id, imgUrl, dur, onEnd) {
            if (activeTimers[id]) { activeTimers[id].rem += dur; return; }
            const card = document.createElement('div');
            card.className = 'event-card'; card.id = 'ev-'+id;
            card.innerHTML = `<div class="img-container"><img src="${imgUrl}"></div><div class="event-timer" id="t-${id}">${dur}s</div>`;
            document.getElementById('hud-events').appendChild(card);
            activeTimers[id] = { rem: dur, interval: setInterval(() => {
                activeTimers[id].rem--;
                if(activeTimers[id].rem <= 0) { clearInterval(activeTimers[id].interval); card.remove(); delete activeTimers[id]; onEnd(); }
                else document.getElementById('t-'+id).innerText = activeTimers[id].rem + "s";
            }, 1000)};
        }

        function getLuckImg(m) {
            const imgs = { 2: "https://static.wikia.nocookie.net/stealabr/images/e/ea/2xLuck.webp", 4: "https://static.wikia.nocookie.net/stealabr/images/f/f1/4xLuck.webp", 6: "https://static.wikia.nocookie.net/stealabr/images/9/9e/Clover5.webp", 8: "https://static.wikia.nocookie.net/stealabr/images/7/76/CloverStack.png", 10: "https://static.wikia.nocookie.net/stealabr/images/f/fe/10x.png" };
            return imgs[m] || "";
        }

        function getLuckStyle(m) {
            if(m <= 2) return {color:'#32CD32'}; if(m <= 4) return {color:'#DAA520'};
            if(m <= 6) return {color:'#DA70D6'}; return {isRainbow:true};
        }

        function spawnApple(fG, c) {
            for(let i=0; i<c; i++) {
                let isG = fG || Math.random() < currentLuck;
                apples.push({ x: Math.random()*(canvas.width-60)+30, y: Math.random()*(canvas.height-60)+30, isG: isG });
            }
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let dx = player.x - ball.x, dy = player.y - ball.y, dist = Math.sqrt(dx*dx+dy*dy);
            if(dist > 30) { ball.x += (dx/dist)*ball.speed; ball.y += (dy/dist)*ball.speed; }
            ctx.font = "40px Nunito"; ctx.textAlign = "center";
            ctx.fillText("🕹", player.x, player.y); ctx.fillText("🏐", ball.x, ball.y);
            apples = apples.filter(a => {
                let d = Math.sqrt((ball.x-a.x)**2 + (ball.y-a.y)**2);
                if(d < 30) {
                    score += a.isG ? 3 : 1; document.getElementById("score").innerText = "Score: " + score;
                    if(a.isG) { ball.speed = ball.baseSpeed * greenAppleBoost; setTimeout(()=>ball.speed=ball.baseSpeed, 3000); }
                    return false;
                }
                ctx.fillText(a.isG?"🍏":"🍎", a.x, a.y); return true;
            });
            requestAnimationFrame(update);
        }

        function countdown() {
            if(timeLeft > 0) { timeLeft--; document.getElementById("timer-display").innerText = "Timer: " + timeLeft; setTimeout(countdown, 1000); }
            else { gameActive = false; alert("Score final: " + score); location.reload(); }
        }

        window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
        setInterval(() => { if(gameActive) spawnApple(false, 1); }, 1000);
        update(); countdown();
    </script>
</body>
</html>
